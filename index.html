<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Star Movie Show</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

header {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  z-index:10;
}

h1 {
  margin:5px;
  color:#00ffd5;
}

#feed {
  margin-top:160px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
}

.videoCard {
  position:relative;
}

video {
  width:320px;
  height:520px;
  object-fit:cover;
  border-radius:10px;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:5px;
  justify-content:center;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.like {
  background:red;
  color:white;
}

.comment {
  font-size:12px;
  margin-top:3px;
}

input {
  padding:6px;
  border-radius:5px;
  border:none;
  margin:3px;
}

.viewCounter {
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}
</style>
</head>

<body>

<header>
<h1>The Star Movie Show</h1>
<input id="username" placeholder="Enter username">
<button onclick="login()">Login</button>
<br>
<input type="file" id="upload" accept="video/*">
</header>

<div id="feed"></div>

<script>
let user=null;

function login(){
  const name=document.getElementById("username").value;
  if(name){
    user=name;
    alert("Logged in as "+name);
  }
}

const upload=document.getElementById("upload");
const feed=document.getElementById("feed");

upload.addEventListener("change",function(){
  const file=this.files[0];
  if(!file)return;
  const url=URL.createObjectURL(file);
  createVideoCard(url);
});

function createVideoCard(src){
  const card=document.createElement("div");
  card.className="videoCard";

  const video=document.createElement("video");
  video.src=src;
  video.controls=true;
  video.loop=true;

  // Likes
  let likes=0;
  const likeBtn=document.createElement("button");
  likeBtn.className="like";
  likeBtn.innerText="❤️ 0";
  likeBtn.onclick=()=>{ likes++; likeBtn.innerText="❤️ "+likes; };

  // Share
  const shareBtn=document.createElement("button");
  shareBtn.innerText="Share";
  shareBtn.onclick=()=>{ alert("Share link: "+window.location.href); };

  // Views
  let views=0;
  const viewCounter=document.createElement("div");
  viewCounter.className="viewCounter";
  viewCounter.innerText="Views: 0";
  video.addEventListener("play",()=>{ views++; viewCounter.innerText="Views: "+views; });

  // Comments
  const commentInput=document.createElement("input");
  commentInput.placeholder="Write comment";

  const commentBtn=document.createElement("button");
  commentBtn.innerText="Send";

  const commentsDiv=document.createElement("div");

  commentBtn.onclick=()=>{
    if(!user){ alert("Login first"); return; }
    const text=commentInput.value;
    if(text){
      const c=document.createElement("div");
      c.className="comment";
      c.innerText=user+": "+text;
      commentsDiv.appendChild(c);
      commentInput.value="";
    }
  };

  card.appendChild(video);
  card.appendChild(likeBtn);
  card.appendChild(shareBtn);
  card.appendChild(viewCounter);
  card.appendChild(commentInput);
  card.appendChild(commentBtn);
  card.appendChild(commentsDiv);

  feed.prepend(card);
}
</script>

</body>
</html>
